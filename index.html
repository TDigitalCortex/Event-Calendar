<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Clock · Global & Event Settings</title>
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* --- Reset & Base --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f2f6fc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            transition: background 0.2s;
        }

        .clock-card {
            max-width: 780px;
            width: 100%;
            background: #ffffff;
            border-radius: 40px;
            padding: 2rem 2rem 2.2rem;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.2);
            transition: background 0.2s, box-shadow 0.2s;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #0b1e33;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 1.8rem;
            transition: color 0.2s;
        }

        h1 i { color: #2563eb; transition: color 0.2s; }

        /* --- Real-time clock display --- */
        .clock-display {
            background: #f8fafc;
            border-radius: 60px;
            padding: 1.8rem 1rem;
            text-align: center;
            margin-bottom: 1rem;
            border: 1px solid #e9edf2;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.02);
            transition: background 0.2s, border-color 0.2s;
        }

        #realTimeClock {
            font-size: 4.8rem;
            font-weight: 600;
            letter-spacing: 3px;
            color: #0b1e33;
            font-variant-numeric: tabular-nums;
            line-height: 1.2;
            transition: color 0.2s;
        }

        .clock-label {
            font-size: 0.9rem;
            color: #64748b;
            letter-spacing: 1px;
            margin-top: 0.25rem;
            transition: color 0.2s;
        }

        /* --- Global Settings Button --- */
        .global-settings-area {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 1.5rem;
        }

        .global-settings-btn {
            background: #f1f5f9;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #1e293b;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid #e2e8f0;
        }

        .global-settings-btn:hover {
            background: #e2e8f0;
            transform: scale(1.02);
        }

        .global-settings-btn i { color: #2563eb; }

        /* --- Event Section --- */
        .event-section { margin-top: 0.8rem; }

        .event-input-area {
            display: flex;
            gap: 0.6rem;
            margin-bottom: 1.5rem;
        }

        .event-input-area input {
            flex: 1;
            padding: 0.8rem 1.2rem;
            border-radius: 40px;
            border: 1px solid #d1d9e6;
            background: white;
            font-size: 0.95rem;
            outline: none;
            transition: 0.15s;
        }

        .event-input-area input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px #2563eb30;
        }

        .event-input-area button {
            background: #2563eb;
            border: none;
            color: white;
            font-size: 1.1rem;
            padding: 0 1.5rem;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            box-shadow: 0 6px 14px -4px #2563eb70;
        }

        .event-input-area button:hover {
            background: #1d4ed8;
            transform: scale(1.02);
        }

        /* --- Tabs --- */
        .tabs-container {
            display: flex;
            gap: 0.3rem;
            margin-bottom: 1.2rem;
            border-bottom: 2px solid #e9edf2;
            padding-bottom: 0.3rem;
        }

        .tab-btn {
            background: transparent;
            border: none;
            padding: 0.5rem 1.2rem;
            font-size: 0.9rem;
            font-weight: 500;
            color: #64748b;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .tab-btn i { font-size: 0.85rem; }
        .tab-btn:hover { background: #eef2f6; color: #1e293b; }
        .tab-btn.active {
            background: #2563eb;
            color: white;
            box-shadow: 0 4px 10px -4px #2563eb60;
        }

        .tab-btn .badge {
            background: #cbd5e1;
            color: #1e293b;
            border-radius: 30px;
            padding: 0.05rem 0.6rem;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .tab-btn.active .badge { background: #ffffff40; color: white; }

        /* --- Event List --- */
        .event-list {
            list-style: none;
            padding: 0;
            max-height: 320px;
            overflow-y: auto;
            border-radius: 24px;
            background: #f8fafc;
            padding: 0.3rem;
            min-height: 120px;
            transition: background 0.2s;
        }

        .event-list li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.7rem 0.8rem 0.7rem 1.2rem;
            background: white;
            margin: 0.3rem 0.2rem;
            border-radius: 40px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
            border: 1px solid #e9edf2;
            transition: background 0.2s, border-color 0.2s, color 0.2s;
            flex-wrap: wrap;
            gap: 0.3rem 0.6rem;
        }

        .event-list li:hover { background: #fafcff; border-color: #cbd5e1; }

        .event-name {
            font-weight: 500;
            color: #0b1e33;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex: 2 1 140px;
            transition: color 0.2s;
        }

        .event-name i { color: #2563eb; width: 1.2rem; transition: color 0.2s; }

        .event-meta {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .event-time, .event-date {
            font-size: 0.8rem;
            background: #eef2f6;
            padding: 0.15rem 0.8rem;
            border-radius: 30px;
            color: #1e293b;
            transition: background 0.2s, color 0.2s;
        }

        .event-actions {
            display: flex;
            gap: 0.15rem;
            align-items: center;
        }

        .event-actions button {
            background: transparent;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 0.95rem;
            padding: 0.25rem 0.5rem;
            border-radius: 30px;
            transition: 0.1s;
        }

        .event-actions .settings-btn:hover { color: #2563eb; background: #dbeafe; }
        .event-actions .hide-btn:hover { color: #f59e0b; background: #fef3c7; }
        .event-actions .delete-btn:hover { color: #ef4444; background: #fee2e2; }
        .event-actions .restore-btn:hover { color: #10b981; background: #d1fae5; }

        .empty-events {
            text-align: center;
            color: #94a3b8;
            padding: 1.8rem 0.5rem;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        /* --- Settings Modal (popup) --- */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-overlay.open { display: flex; }

        .modal-box {
            background: white;
            border-radius: 32px;
            max-width: 520px;
            width: 92%;
            padding: 1.8rem 2rem 2rem;
            box-shadow: 0 30px 60px -20px rgba(0,0,0,0.5);
            max-height: 90vh;
            overflow-y: auto;
            transition: background 0.2s, color 0.2s;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #0b1e33;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .modal-header h2 i { color: #2563eb; }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.8rem;
            color: #94a3b8;
            cursor: pointer;
            padding: 0 0.4rem;
            border-radius: 30px;
            transition: 0.15s;
        }

        .modal-close:hover { background: #f1f5f9; color: #0b1e33; }

        .settings-group {
            margin-bottom: 1.5rem;
            padding-bottom: 1.2rem;
            border-bottom: 1px solid #e9edf2;
        }

        .settings-group:last-child { border-bottom: none; margin-bottom: 0; }

        .settings-group label {
            display: block;
            font-weight: 500;
            color: #1e293b;
            margin-bottom: 0.4rem;
            font-size: 0.9rem;
        }

        .settings-group .color-row {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .settings-group input[type="color"] {
            width: 44px;
            height: 44px;
            border: 2px solid #d1d9e6;
            border-radius: 30px;
            padding: 2px;
            cursor: pointer;
            background: white;
        }

        .settings-group input[type="text"],
        .settings-group input[type="datetime-local"] {
            flex: 1;
            padding: 0.5rem 1rem;
            border-radius: 30px;
            border: 1px solid #d1d9e6;
            font-size: 0.9rem;
            outline: none;
            min-width: 140px;
        }

        .settings-group input[type="text"]:focus,
        .settings-group input[type="datetime-local"]:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px #2563eb30;
        }

        .settings-note {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-top: 0.3rem;
        }

        .save-settings-btn {
            background: #2563eb;
            border: none;
            color: white;
            font-size: 1rem;
            padding: 0.6rem 1.8rem;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 6px 14px -4px #2563eb70;
            margin-top: 0.8rem;
            width: 100%;
        }

        .save-settings-btn:hover { background: #1d4ed8; transform: scale(1.01); }

        /* --- Footer --- */
        .footer-credit {
            margin-top: 1.8rem;
            font-size: 0.75rem;
            color: #94a3b8;
            text-align: center;
            border-top: 1px solid #e2e8f0;
            padding-top: 1.2rem;
            transition: color 0.2s, border-color 0.2s;
        }

        /* scroll */
        .event-list::-webkit-scrollbar { width: 6px; }
        .event-list::-webkit-scrollbar-track { background: #e2e8f0; border-radius: 20px; }
        .event-list::-webkit-scrollbar-thumb { background: #b9c7da; border-radius: 20px; }

        /* responsive */
        @media (max-width: 550px) {
            .clock-card { padding: 1.2rem; }
            #realTimeClock { font-size: 3.4rem; }
            .event-input-area { flex-wrap: wrap; }
            .event-input-area button { width: 100%; justify-content: center; }
            .tabs-container { flex-wrap: wrap; }
            .modal-box { padding: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="clock-card" id="appContainer">
    <h1 id="mainHeading">
        <i class="fas fa-clock" id="headingIcon"></i> Event Clock · Settings
    </h1>

    <!-- Real-time Clock -->
    <div class="clock-display" id="clockDisplay">
        <div id="realTimeClock">--:--:--</div>
        <div class="clock-label" id="clockLabel"><i class="far fa-calendar-alt"></i> current time</div>
    </div>

    <!-- Global Settings Button -->
    <div class="global-settings-area">
        <button class="global-settings-btn" id="globalSettingsBtn">
            <i class="fas fa-palette"></i> Global Styles
        </button>
    </div>

    <!-- Event Management -->
    <div class="event-section">
        <div class="event-input-area">
            <input type="text" id="eventNameInput" placeholder="Event name (e.g. Meeting, Code)" />
            <button id="addEventBtn"><i class="fas fa-plus-circle"></i> Add</button>
        </div>

        <div class="tabs-container" id="tabContainer">
            <button class="tab-btn active" data-tab="active"><i class="fas fa-list-ul"></i> Active <span class="badge" id="activeCount">0</span></button>
            <button class="tab-btn" data-tab="hidden"><i class="fas fa-eye-slash"></i> Hidden <span class="badge" id="hiddenCount">0</span></button>
            <button class="tab-btn" data-tab="deleted"><i class="fas fa-trash-alt"></i> Deleted <span class="badge" id="deletedCount">0</span></button>
        </div>

        <ul class="event-list" id="eventList">
            <li class="empty-events"><i class="fas fa-plus-circle"></i> No events — add one above</li>
        </ul>
    </div>

    <div class="footer-credit" id="footerCredit">
        <i class="fas fa-cog"></i> Click <i class="fas fa-cog"></i> on any event for date settings
    </div>
</div>

<!-- Settings Modal (shared for Global & Event) -->
<div class="modal-overlay" id="settingsModal">
    <div class="modal-box" id="modalBox">
        <div class="modal-header">
            <h2><i class="fas fa-palette"></i> <span id="modalTitle">Global Styles</span></h2>
            <button class="modal-close" id="modalCloseBtn">&times;</button>
        </div>

        <!-- Global Styles (always visible) -->
        <div id="globalSettingsSection">
            <div class="settings-group">
                <label>Card Background</label>
                <div class="color-row">
                    <input type="color" id="cardBgColor" value="#ffffff">
                    <input type="text" id="cardBgText" value="#ffffff" placeholder="#hex">
                </div>
            </div>

            <div class="settings-group">
                <label>Event Text Color</label>
                <div class="color-row">
                    <input type="color" id="eventTextColor" value="#0b1e33">
                    <input type="text" id="eventTextText" value="#0b1e33" placeholder="#hex">
                </div>
            </div>

            <div class="settings-group">
                <label>Clock Time Color</label>
                <div class="color-row">
                    <input type="color" id="clockColor" value="#0b1e33">
                    <input type="text" id="clockText" value="#0b1e33" placeholder="#hex">
                </div>
            </div>

            <div class="settings-group">
                <label>Clock Background</label>
                <div class="color-row">
                    <input type="color" id="clockBgColor" value="#f8fafc">
                    <input type="text" id="clockBgText" value="#f8fafc" placeholder="#hex">
                </div>
            </div>

            <div class="settings-group">
                <label>Page Background</label>
                <div class="color-row">
                    <input type="color" id="pageBgColor" value="#f2f6fc">
                    <input type="text" id="pageBgText" value="#f2f6fc" placeholder="#hex">
                </div>
            </div>

            <div class="settings-group">
                <label>Task Card Color (event items)</label>
                <div class="color-row">
                    <input type="color" id="taskCardColor" value="#ffffff">
                    <input type="text" id="taskCardText" value="#ffffff" placeholder="#hex">
                </div>
            </div>
        </div>

        <!-- Event-specific Settings (shown when editing an event) -->
        <div id="eventSettingsSection" style="display: none;">
            <div class="settings-group">
                <label>Event Name</label>
                <input type="text" id="eventNameEdit" placeholder="Event name">
            </div>

            <div class="settings-group">
                <label>Event Date & Time</label>
                <input type="datetime-local" id="eventDateTime">
                <div class="settings-note">Set the date and time for this event.</div>
            </div>

            <div class="settings-group">
                <label>Created At (read-only)</label>
                <input type="text" id="eventCreatedAt" readonly style="background:#f1f5f9; cursor:default;">
                <div class="settings-note">This is when the event was originally created.</div>
            </div>
        </div>

        <button class="save-settings-btn" id="saveSettingsBtn"><i class="fas fa-save"></i> Apply Settings</button>
        <div class="settings-note" style="margin-top:0.8rem;">Global styles apply to the whole page. Event settings update the selected event.</div>
    </div>
</div>

<script>
    (function() {
        "use strict";

        // --- DOM refs ---
        const realTimeClock = document.getElementById('realTimeClock');
        const eventNameInput = document.getElementById('eventNameInput');
        const addEventBtn = document.getElementById('addEventBtn');
        const eventList = document.getElementById('eventList');
        const tabContainer = document.getElementById('tabContainer');
        const activeCountSpan = document.getElementById('activeCount');
        const hiddenCountSpan = document.getElementById('hiddenCount');
        const deletedCountSpan = document.getElementById('deletedCount');

        // Modal refs
        const settingsModal = document.getElementById('settingsModal');
        const modalCloseBtn = document.getElementById('modalCloseBtn');
        const modalTitle = document.getElementById('modalTitle');
        const globalSettingsSection = document.getElementById('globalSettingsSection');
        const eventSettingsSection = document.getElementById('eventSettingsSection');
        const saveSettingsBtn = document.getElementById('saveSettingsBtn');
        const globalSettingsBtn = document.getElementById('globalSettingsBtn');

        // Global color inputs
        const cardBgColor = document.getElementById('cardBgColor');
        const cardBgText = document.getElementById('cardBgText');
        const eventTextColor = document.getElementById('eventTextColor');
        const eventTextText = document.getElementById('eventTextText');
        const clockColor = document.getElementById('clockColor');
        const clockText = document.getElementById('clockText');
        const clockBgColor = document.getElementById('clockBgColor');
        const clockBgText = document.getElementById('clockBgText');
        const pageBgColor = document.getElementById('pageBgColor');
        const pageBgText = document.getElementById('pageBgText');
        const taskCardColor = document.getElementById('taskCardColor');
        const taskCardText = document.getElementById('taskCardText');

        // Event-specific inputs
        const eventNameEdit = document.getElementById('eventNameEdit');
        const eventDateTime = document.getElementById('eventDateTime');
        const eventCreatedAt = document.getElementById('eventCreatedAt');

        // --- State ---
        let events = [];
        let nextId = 1;
        let currentTab = 'active';
        let currentEditingEventId = null; // null = global settings mode

        // --- Real-time clock ---
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            realTimeClock.textContent = `${h}:${m}:${s}`;
        }
        updateClock();
        setInterval(updateClock, 1000);

        // --- Helpers ---
        function formatTime(sec) {
            const m = Math.floor(sec / 60);
            const s = sec % 60;
            return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        function getNowISO() {
            return new Date().toLocaleString('en-US', { hour12: false });
        }

        function getNowDateTimeLocal() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            return `${year}-${month}-${day}T${hours}:${minutes}`;
        }

        // --- Render events ---
        function renderEvents() {
            let filtered = [];
            if (currentTab === 'active') filtered = events.filter(e => e.status === 'active');
            else if (currentTab === 'hidden') filtered = events.filter(e => e.status === 'hidden');
            else if (currentTab === 'deleted') filtered = events.filter(e => e.status === 'deleted');

            filtered.sort((a, b) => b.id - a.id);

            activeCountSpan.textContent = events.filter(e => e.status === 'active').length;
            hiddenCountSpan.textContent = events.filter(e => e.status === 'hidden').length;
            deletedCountSpan.textContent = events.filter(e => e.status === 'deleted').length;

            eventList.innerHTML = '';
            if (filtered.length === 0) {
                const empty = document.createElement('li');
                empty.className = 'empty-events';
                let msg = currentTab === 'active' ? 'No active events — add one!' :
                          currentTab === 'hidden' ? 'No hidden events' : 'No deleted events';
                empty.innerHTML = `<i class="fas fa-info-circle"></i> ${msg}`;
                eventList.appendChild(empty);
                return;
            }

            for (const ev of filtered) {
                const li = document.createElement('li');
                li.dataset.eventId = ev.id;

                // Name
                const nameSpan = document.createElement('span');
                nameSpan.className = 'event-name';
                nameSpan.innerHTML = `<i class="fas fa-circle-check"></i> ${escapeHtml(ev.name)}`;

                // Meta: time + date
                const metaSpan = document.createElement('span');
                metaSpan.className = 'event-meta';
                const timeSpan = document.createElement('span');
                timeSpan.className = 'event-time';
                timeSpan.textContent = `⏱ ${formatTime(ev.durationSeconds || 0)}`;
                const dateSpan = document.createElement('span');
                dateSpan.className = 'event-date';
                // Show custom date if set, otherwise creation date
                const displayDate = ev.customDate ? new Date(ev.customDate).toLocaleString('en-US', { hour12: false }) : (ev.createdAt || 'now');
                dateSpan.textContent = `📅 ${displayDate}`;
                metaSpan.appendChild(timeSpan);
                metaSpan.appendChild(dateSpan);

                // Actions
                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'event-actions';

                // Settings (cog) - opens modal for event
                const settingsBtn = document.createElement('button');
                settingsBtn.className = 'settings-btn';
                settingsBtn.innerHTML = '<i class="fas fa-cog"></i>';
                settingsBtn.title = 'Event Settings';
                settingsBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openEventSettings(ev.id);
                });

                // Hide / Restore
                const hideBtn = document.createElement('button');
                if (currentTab === 'active') {
                    hideBtn.className = 'hide-btn';
                    hideBtn.innerHTML = '<i class="fas fa-minus-circle"></i>';
                    hideBtn.title = 'Hide event';
                    hideBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        ev.status = 'hidden';
                        renderEvents();
                    });
                } else {
                    hideBtn.className = 'restore-btn';
                    hideBtn.innerHTML = '<i class="fas fa-undo-alt"></i>';
                    hideBtn.title = 'Restore to Active';
                    hideBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        ev.status = 'active';
                        renderEvents();
                    });
                }

                // Delete / Erase (no confirmation for erase)
                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'delete-btn';
                if (currentTab === 'deleted') {
                    deleteBtn.innerHTML = '<i class="fas fa-eraser"></i>';
                    deleteBtn.title = 'Permanently erase';
                    deleteBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        events = events.filter(e => e.id !== ev.id);
                        renderEvents();
                    });
                } else {
                    deleteBtn.innerHTML = '<i class="fas fa-trash-alt"></i>';
                    deleteBtn.title = 'Move to Deleted';
                    deleteBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        ev.status = 'deleted';
                        renderEvents();
                    });
                }

                actionsDiv.appendChild(settingsBtn);
                actionsDiv.appendChild(hideBtn);
                actionsDiv.appendChild(deleteBtn);

                li.appendChild(nameSpan);
                li.appendChild(metaSpan);
                li.appendChild(actionsDiv);
                eventList.appendChild(li);
            }

            // Apply current styles to all items
            applyAllStyles();
        }

        // --- Settings Modal ---
        function openGlobalSettings() {
            currentEditingEventId = null;
            modalTitle.textContent = 'Global Styles';
            globalSettingsSection.style.display = 'block';
            eventSettingsSection.style.display = 'none';
            settingsModal.classList.add('open');
            loadStylesIntoModal();
        }

        function openEventSettings(eventId) {
            const ev = events.find(e => e.id === eventId);
            if (!ev) return;
            currentEditingEventId = eventId;
            modalTitle.textContent = `Event: "${ev.name}"`;
            globalSettingsSection.style.display = 'block'; // Keep global styles visible
            eventSettingsSection.style.display = 'block';

            // Populate event fields
            eventNameEdit.value = ev.name;
            // Set datetime-local value if customDate exists, otherwise use current time
            if (ev.customDate) {
                const date = new Date(ev.customDate);
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                const hours = String(date.getHours()).padStart(2, '0');
                const minutes = String(date.getMinutes()).padStart(2, '0');
                eventDateTime.value = `${year}-${month}-${day}T${hours}:${minutes}`;
            } else {
                eventDateTime.value = getNowDateTimeLocal();
            }
            eventCreatedAt.value = ev.createdAt || 'Unknown';

            settingsModal.classList.add('open');
            loadStylesIntoModal();
        }

        function closeSettingsModal() {
            settingsModal.classList.remove('open');
            currentEditingEventId = null;
        }

        // Load styles from the current app container into modal inputs
        function loadStylesIntoModal() {
            const container = document.getElementById('appContainer');
            const style = getComputedStyle(container);
            const cardBg = style.backgroundColor || '#ffffff';
            const cardBgHex = rgbToHex(cardBg);
            cardBgColor.value = cardBgHex;
            cardBgText.value = cardBgHex;

            const eventText = getComputedStyle(document.querySelector('.event-name') || document.createElement('div')).color || '#0b1e33';
            const eventTextHex = rgbToHex(eventText);
            eventTextColor.value = eventTextHex;
            eventTextText.value = eventTextHex;

            const clock = document.getElementById('realTimeClock');
            const clockCol = getComputedStyle(clock).color || '#0b1e33';
            const clockColHex = rgbToHex(clockCol);
            clockColor.value = clockColHex;
            clockText.value = clockColHex;

            const clockDisplay = document.getElementById('clockDisplay');
            const clockBg = getComputedStyle(clockDisplay).backgroundColor || '#f8fafc';
            const clockBgHex = rgbToHex(clockBg);
            clockBgColor.value = clockBgHex;
            clockBgText.value = clockBgHex;

            const pageBg = getComputedStyle(document.body).backgroundColor || '#f2f6fc';
            const pageBgHex = rgbToHex(pageBg);
            pageBgColor.value = pageBgHex;
            pageBgText.value = pageBgHex;

            const firstLi = document.querySelector('.event-list li');
            if (firstLi) {
                const taskBg = getComputedStyle(firstLi).backgroundColor || '#ffffff';
                const taskBgHex = rgbToHex(taskBg);
                taskCardColor.value = taskBgHex;
                taskCardText.value = taskBgHex;
            } else {
                taskCardColor.value = '#ffffff';
                taskCardText.value = '#ffffff';
            }
        }

        function rgbToHex(rgb) {
            if (!rgb || rgb === '') return '#ffffff';
            if (rgb.startsWith('#')) return rgb;
            const match = rgb.match(/(\d+),\s*(\d+),\s*(\d+)/);
            if (!match) return '#ffffff';
            const r = parseInt(match[1], 10);
            const g = parseInt(match[2], 10);
            const b = parseInt(match[3], 10);
            return '#' + [r, g, b].map(c => c.toString(16).padStart(2, '0')).join('');
        }

        // --- Apply styles from modal inputs ---
        function applyAllStyles() {
            const cardBg = cardBgColor.value;
            const eventText = eventTextColor.value;
            const clockCol = clockColor.value;
            const clockBg = clockBgColor.value;
            const pageBg = pageBgColor.value;
            const taskCard = taskCardColor.value;

            const container = document.getElementById('appContainer');
            container.style.backgroundColor = cardBg;

            document.querySelectorAll('.event-name').forEach(el => {
                el.style.color = eventText;
            });
            document.getElementById('mainHeading').style.color = eventText;
            document.getElementById('headingIcon').style.color = eventText;

            document.getElementById('realTimeClock').style.color = clockCol;
            document.getElementById('clockLabel').style.color = clockCol;

            document.getElementById('clockDisplay').style.backgroundColor = clockBg;

            document.body.style.backgroundColor = pageBg;

            document.querySelectorAll('.event-list li').forEach(el => {
                el.style.backgroundColor = taskCard;
            });

            document.getElementById('modalBox').style.backgroundColor = cardBg;
            document.querySelectorAll('.modal-box .settings-group label, .modal-box .settings-note, .modal-header h2').forEach(el => {
                el.style.color = eventText;
            });
        }

        // --- Sync color inputs ---
        function syncColorInputs(colorInput, textInput) {
            colorInput.addEventListener('input', function() {
                textInput.value = this.value;
            });
            textInput.addEventListener('input', function() {
                if (this.value.startsWith('#') && this.value.length === 7) {
                    colorInput.value = this.value;
                }
            });
        }
        syncColorInputs(cardBgColor, cardBgText);
        syncColorInputs(eventTextColor, eventTextText);
        syncColorInputs(clockColor, clockText);
        syncColorInputs(clockBgColor, clockBgText);
        syncColorInputs(pageBgColor, pageBgText);
        syncColorInputs(taskCardColor, taskCardText);

        // --- Add event ---
        function addEvent() {
            const name = eventNameInput.value.trim();
            if (name === '') { alert('Please enter an event name.'); return; }

            const now = new Date();
            const durationSec = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();

            events.push({
                id: nextId++,
                name: name,
                status: 'active',
                durationSeconds: durationSec,
                createdAt: now.toLocaleString('en-US', { hour12: false }),
                customDate: null // will be set via event settings
            });

            eventNameInput.value = '';
            renderEvents();
        }

        // --- Save settings (global + event) ---
        function saveSettings() {
            // Apply global styles
            applyAllStyles();

            // If editing an event, update its data
            if (currentEditingEventId !== null) {
                const ev = events.find(e => e.id === currentEditingEventId);
                if (ev) {
                    const newName = eventNameEdit.value.trim();
                    if (newName) {
                        ev.name = newName;
                    }
                    // Update custom date
                    if (eventDateTime.value) {
                        ev.customDate = eventDateTime.value;
                    }
                    // Re-render to show updated name and date
                    renderEvents();
                }
            }

            closeSettingsModal();
        }

        // --- Escape ---
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // --- Tabs ---
        function setupTabs() {
            const tabs = tabContainer.querySelectorAll('.tab-btn');
            tabs.forEach(btn => {
                btn.addEventListener('click', function() {
                    tabs.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentTab = this.dataset.tab;
                    renderEvents();
                });
            });
        }

        // --- Init ---
        function init() {
            // Sample events with custom dates
            const now = new Date();
            const yesterday = new Date(now);
            yesterday.setDate(yesterday.getDate() - 1);
            
            events = [
                { 
                    id: nextId++, 
                    name: 'Morning standup', 
                    status: 'active', 
                    durationSeconds: 900, 
                    createdAt: now.toLocaleString('en-US', { hour12: false }),
                    customDate: now.toISOString()
                },
                { 
                    id: nextId++, 
                    name: 'Code review', 
                    status: 'active', 
                    durationSeconds: 1800, 
                    createdAt: now.toLocaleString('en-US', { hour12: false }),
                    customDate: null
                },
                { 
                    id: nextId++, 
                    name: 'Design sync', 
                    status: 'hidden', 
                    durationSeconds: 1200, 
                    createdAt: yesterday.toLocaleString('en-US', { hour12: false }),
                    customDate: yesterday.toISOString()
                },
                { 
                    id: nextId++, 
                    name: 'Old task', 
                    status: 'deleted', 
                    durationSeconds: 600, 
                    createdAt: yesterday.toLocaleString('en-US', { hour12: false }),
                    customDate: null
                },
            ];
            const maxId = events.reduce((max, e) => Math.max(max, e.id), 0);
            nextId = maxId + 1;

            renderEvents();
            setupTabs();

            // Event listeners
            addEventBtn.addEventListener('click', addEvent);
            eventNameInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') addEvent(); });

            // Global settings button
            globalSettingsBtn.addEventListener('click', openGlobalSettings);

            // Modal close
            modalCloseBtn.addEventListener('click', closeSettingsModal);
            settingsModal.addEventListener('click', function(e) {
                if (e.target === this) closeSettingsModal();
            });

            // Save settings
            saveSettingsBtn.addEventListener('click', saveSettings);

            // Apply initial styles
            setTimeout(() => {
                loadStylesIntoModal();
                applyAllStyles();
            }, 50);
        }

        init();
    })();
</script>
</body>
</html>

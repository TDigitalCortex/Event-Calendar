<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Clock · Real Time</title>
  <!-- Font Awesome 6 (free) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* --- Reset & Base --- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: #f2f6fc;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
    }

    .clock-card {
      max-width: 720px;
      width: 100%;
      background: #ffffff;
      border-radius: 40px;
      padding: 2rem 2rem 2.2rem;
      box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.2);
      transition: 0.2s;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 600;
      color: #0b1e33;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.8rem;
    }

    h1 i {
      color: #2563eb;
    }

    /* --- Real-time clock display --- */
    .clock-display {
      background: #f8fafc;
      border-radius: 60px;
      padding: 1.8rem 1rem;
      text-align: center;
      margin-bottom: 2rem;
      border: 1px solid #e9edf2;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.02);
    }

    #realTimeClock {
      font-size: 4.8rem;
      font-weight: 600;
      letter-spacing: 3px;
      color: #0b1e33;
      font-variant-numeric: tabular-nums;
      line-height: 1.2;
    }

    .clock-label {
      font-size: 0.9rem;
      color: #64748b;
      letter-spacing: 1px;
      margin-top: 0.25rem;
    }

    /* --- Event (Task) Section --- */
    .event-section {
      margin-top: 0.8rem;
    }

    .event-input-area {
      display: flex;
      gap: 0.6rem;
      margin-bottom: 1.5rem;
    }

    .event-input-area input {
      flex: 1;
      padding: 0.8rem 1.2rem;
      border-radius: 40px;
      border: 1px solid #d1d9e6;
      background: white;
      font-size: 0.95rem;
      outline: none;
      transition: 0.15s;
    }

    .event-input-area input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px #2563eb30;
    }

    .event-input-area button {
      background: #2563eb;
      border: none;
      color: white;
      font-size: 1.1rem;
      padding: 0 1.5rem;
      border-radius: 40px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.15s;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      box-shadow: 0 6px 14px -4px #2563eb70;
    }

    .event-input-area button:hover {
      background: #1d4ed8;
      transform: scale(1.02);
    }

    /* --- Tabs: Active, Hidden, Deleted --- */
    .tabs-container {
      display: flex;
      gap: 0.3rem;
      margin-bottom: 1.2rem;
      border-bottom: 2px solid #e9edf2;
      padding-bottom: 0.3rem;
    }

    .tab-btn {
      background: transparent;
      border: none;
      padding: 0.5rem 1.2rem;
      font-size: 0.9rem;
      font-weight: 500;
      color: #64748b;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.15s;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .tab-btn i {
      font-size: 0.85rem;
    }

    .tab-btn:hover {
      background: #eef2f6;
      color: #1e293b;
    }

    .tab-btn.active {
      background: #2563eb;
      color: white;
      box-shadow: 0 4px 10px -4px #2563eb60;
    }

    .tab-btn .badge {
      background: #cbd5e1;
      color: #1e293b;
      border-radius: 30px;
      padding: 0.05rem 0.6rem;
      font-size: 0.7rem;
      font-weight: 600;
    }

    .tab-btn.active .badge {
      background: #ffffff40;
      color: white;
    }

    /* --- Event List (shared) --- */
    .event-list {
      list-style: none;
      padding: 0;
      max-height: 320px;
      overflow-y: auto;
      border-radius: 24px;
      background: #f8fafc;
      padding: 0.3rem;
      min-height: 120px;
    }

    .event-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.7rem 0.8rem 0.7rem 1.2rem;
      background: white;
      margin: 0.3rem 0.2rem;
      border-radius: 40px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
      border: 1px solid #e9edf2;
      transition: 0.1s;
      flex-wrap: wrap;
      gap: 0.3rem 0.6rem;
    }

    .event-list li:hover {
      background: #fafcff;
      border-color: #cbd5e1;
    }

    .event-name {
      font-weight: 500;
      color: #0b1e33;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex: 2 1 140px;
    }

    .event-name i {
      color: #2563eb;
      width: 1.2rem;
    }

    .event-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .event-time {
      font-size: 0.8rem;
      background: #eef2f6;
      padding: 0.15rem 0.8rem;
      border-radius: 30px;
      color: #1e293b;
    }

    .event-actions {
      display: flex;
      gap: 0.15rem;
      align-items: center;
    }

    .event-actions button {
      background: transparent;
      border: none;
      color: #94a3b8;
      cursor: pointer;
      font-size: 0.95rem;
      padding: 0.25rem 0.5rem;
      border-radius: 30px;
      transition: 0.1s;
    }

    .event-actions .settings-btn:hover {
      color: #2563eb;
      background: #dbeafe;
    }

    .event-actions .hide-btn:hover {
      color: #f59e0b;
      background: #fef3c7;
    }

    .event-actions .delete-btn:hover {
      color: #ef4444;
      background: #fee2e2;
    }

    .event-actions .restore-btn:hover {
      color: #10b981;
      background: #d1fae5;
    }

    .empty-events {
      text-align: center;
      color: #94a3b8;
      padding: 1.8rem 0.5rem;
      font-size: 0.95rem;
    }

    /* --- footer --- */
    .footer-credit {
      margin-top: 1.8rem;
      font-size: 0.75rem;
      color: #94a3b8;
      text-align: center;
      border-top: 1px solid #e2e8f0;
      padding-top: 1.2rem;
    }

    /* scroll */
    .event-list::-webkit-scrollbar {
      width: 6px;
    }
    .event-list::-webkit-scrollbar-track {
      background: #e2e8f0;
      border-radius: 20px;
    }
    .event-list::-webkit-scrollbar-thumb {
      background: #b9c7da;
      border-radius: 20px;
    }

    /* responsive */
    @media (max-width: 500px) {
      .clock-card { padding: 1.2rem; }
      #realTimeClock { font-size: 3.4rem; }
      .event-input-area { flex-wrap: wrap; }
      .event-input-area button { width: 100%; justify-content: center; }
      .tabs-container { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

<div class="clock-card">
  <h1>
    <i class="fas fa-clock"></i> Event Clock · Real Time
  </h1>

  <!-- Real-time Clock (no timer logic) -->
  <div class="clock-display">
    <div id="realTimeClock">--:--:--</div>
    <div class="clock-label"><i class="far fa-calendar-alt"></i> current time</div>
  </div>

  <!-- Event (Task) Management -->
  <div class="event-section">
    <div class="event-input-area">
      <input type="text" id="eventNameInput" placeholder="Event name (e.g. Meeting, Code, Read)" />
      <button id="addEventBtn"><i class="fas fa-plus-circle"></i> Add</button>
    </div>

    <!-- Tabs: Active / Hidden / Deleted -->
    <div class="tabs-container" id="tabContainer">
      <button class="tab-btn active" data-tab="active"><i class="fas fa-list-ul"></i> Active <span class="badge" id="activeCount">0</span></button>
      <button class="tab-btn" data-tab="hidden"><i class="fas fa-eye-slash"></i> Hidden <span class="badge" id="hiddenCount">0</span></button>
      <button class="tab-btn" data-tab="deleted"><i class="fas fa-trash-alt"></i> Deleted <span class="badge" id="deletedCount">0</span></button>
    </div>

    <!-- Event list container -->
    <ul class="event-list" id="eventList">
      <li class="empty-events"><i class="fas fa-plus-circle"></i> No events — add one above</li>
    </ul>
  </div>

  <div class="footer-credit">
    <i class="fas fa-tasks"></i> Events with hide, delete & settings · real-time clock
  </div>
</div>

<script>
  (function() {
    "use strict";

    // --- DOM refs ---
    const realTimeClock = document.getElementById('realTimeClock');
    const eventNameInput = document.getElementById('eventNameInput');
    const addEventBtn = document.getElementById('addEventBtn');
    const eventList = document.getElementById('eventList');
    const tabContainer = document.getElementById('tabContainer');

    const activeCountSpan = document.getElementById('activeCount');
    const hiddenCountSpan = document.getElementById('hiddenCount');
    const deletedCountSpan = document.getElementById('deletedCount');

    // --- State ---
    let events = [];
    let nextId = 1;
    let currentTab = 'active'; // 'active', 'hidden', 'deleted'

    // --- Real-time clock ---
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');
      realTimeClock.textContent = `${h}:${m}:${s}`;
    }
    updateClock();
    setInterval(updateClock, 1000);

    // --- Helpers ---
    function formatTime(sec) {
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    function getNowISO() {
      return new Date().toLocaleString('en-US', { hour12: false });
    }

    // --- Render events based on currentTab ---
    function renderEvents() {
      // Filter by tab
      let filtered = [];
      if (currentTab === 'active') {
        filtered = events.filter(e => e.status === 'active');
      } else if (currentTab === 'hidden') {
        filtered = events.filter(e => e.status === 'hidden');
      } else if (currentTab === 'deleted') {
        filtered = events.filter(e => e.status === 'deleted');
      }

      // Sort by creation date (newest first)
      filtered.sort((a, b) => b.id - a.id);

      // Update badges
      activeCountSpan.textContent = events.filter(e => e.status === 'active').length;
      hiddenCountSpan.textContent = events.filter(e => e.status === 'hidden').length;
      deletedCountSpan.textContent = events.filter(e => e.status === 'deleted').length;

      // Render list
      eventList.innerHTML = '';
      if (filtered.length === 0) {
        const empty = document.createElement('li');
        empty.className = 'empty-events';
        let msg = '';
        if (currentTab === 'active') msg = 'No active events — add one!';
        else if (currentTab === 'hidden') msg = 'No hidden events';
        else if (currentTab === 'deleted') msg = 'No deleted events';
        empty.innerHTML = `<i class="fas fa-info-circle"></i> ${msg}`;
        eventList.appendChild(empty);
        return;
      }

      for (const ev of filtered) {
        const li = document.createElement('li');

        // Name + icon
        const nameSpan = document.createElement('span');
        nameSpan.className = 'event-name';
        nameSpan.innerHTML = `<i class="fas fa-circle-check"></i> ${escapeHtml(ev.name)}`;

        // Meta: time + created
        const metaSpan = document.createElement('span');
        metaSpan.className = 'event-meta';
        const timeSpan = document.createElement('span');
        timeSpan.className = 'event-time';
        timeSpan.textContent = `⏱ ${formatTime(ev.durationSeconds || 0)}`;
        const createdSpan = document.createElement('span');
        createdSpan.className = 'event-time';
        createdSpan.textContent = `📅 ${ev.createdAt || 'now'}`;
        metaSpan.appendChild(timeSpan);
        metaSpan.appendChild(createdSpan);

        // Actions
        const actionsDiv = document.createElement('div');
        actionsDiv.className = 'event-actions';

        // Settings (cog) - shows an alert with event info (can be extended)
        const settingsBtn = document.createElement('button');
        settingsBtn.className = 'settings-btn';
        settingsBtn.innerHTML = '<i class="fas fa-cog"></i>';
        settingsBtn.title = 'Settings';
        settingsBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          alert(`⚙️ Settings for "${ev.name}"\nID: ${ev.id}\nCreated: ${ev.createdAt || 'unknown'}\nDuration: ${formatTime(ev.durationSeconds || 0)}`);
        });

        // Hide (-) or Restore (if hidden/deleted)
        const hideBtn = document.createElement('button');
        if (currentTab === 'active') {
          hideBtn.className = 'hide-btn';
          hideBtn.innerHTML = '<i class="fas fa-minus-circle"></i>';
          hideBtn.title = 'Hide event';
          hideBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            ev.status = 'hidden';
            renderEvents();
          });
        } else {
          // restore button (for hidden or deleted)
          hideBtn.className = 'restore-btn';
          hideBtn.innerHTML = '<i class="fas fa-undo-alt"></i>';
          hideBtn.title = 'Restore to Active';
          hideBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            ev.status = 'active';
            renderEvents();
          });
        }

        // Delete (trash) - if active or hidden, move to deleted; if deleted, erase permanently
        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'delete-btn';
        if (currentTab === 'deleted') {
          deleteBtn.innerHTML = '<i class="fas fa-eraser"></i>';
          deleteBtn.title = 'Permanently erase';
          deleteBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (confirm(`Permanently erase "${ev.name}"?`)) {
              events = events.filter(e => e.id !== ev.id);
              renderEvents();
            }
          });
        } else {
          deleteBtn.innerHTML = '<i class="fas fa-trash-alt"></i>';
          deleteBtn.title = 'Move to Deleted';
          deleteBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            ev.status = 'deleted';
            renderEvents();
          });
        }

        actionsDiv.appendChild(settingsBtn);
        actionsDiv.appendChild(hideBtn);
        actionsDiv.appendChild(deleteBtn);

        li.appendChild(nameSpan);
        li.appendChild(metaSpan);
        li.appendChild(actionsDiv);
        eventList.appendChild(li);
      }
    }

    // --- Add new event ---
    function addEvent() {
      const name = eventNameInput.value.trim();
      if (name === '') {
        alert('Please enter an event name.');
        return;
      }

      // Use current time as duration (just for demo, can be edited via settings)
      const now = new Date();
      const durationSec = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();

      events.push({
        id: nextId++,
        name: name,
        status: 'active', // 'active', 'hidden', 'deleted'
        durationSeconds: durationSec,
        createdAt: now.toLocaleString('en-US', { hour12: false })
      });

      eventNameInput.value = '';
      renderEvents();
    }

    // --- Escape helper ---
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // --- Tab switching ---
    function setupTabs() {
      const tabs = tabContainer.querySelectorAll('.tab-btn');
      tabs.forEach(btn => {
        btn.addEventListener('click', function() {
          tabs.forEach(b => b.classList.remove('active'));
          this.classList.add('active');
          currentTab = this.dataset.tab;
          renderEvents();
        });
      });
    }

    // --- Init with sample events ---
    function init() {
      // sample events
      events = [
        { id: nextId++, name: 'Morning standup', status: 'active', durationSeconds: 900, createdAt: new Date().toLocaleString('en-US', { hour12: false }) },
        { id: nextId++, name: 'Code review', status: 'active', durationSeconds: 1800, createdAt: new Date().toLocaleString('en-US', { hour12: false }) },
        { id: nextId++, name: 'Design sync', status: 'hidden', durationSeconds: 1200, createdAt: new Date().toLocaleString('en-US', { hour12: false }) },
        { id: nextId++, name: 'Old task', status: 'deleted', durationSeconds: 600, createdAt: new Date().toLocaleString('en-US', { hour12: false }) },
      ];
      // ensure nextId is beyond any existing
      const maxId = events.reduce((max, e) => Math.max(max, e.id), 0);
      nextId = maxId + 1;

      renderEvents();
      setupTabs();

      // Event listeners
      addEventBtn.addEventListener('click', addEvent);
      eventNameInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addEvent();
      });
    }

    init();
  })();
</script>
</body>
</html>
